baseURL = 'https://life-log.gyuha.com/'
languageCode = 'ko-kr'
title = 'Life Log'
theme = 'github-style'
publishDir = 'docs'
enableRobotsTXT = true
enableEmoji = true
pygmentsCodeFences = true
pygmentsUseClasses = true

[build]
  [build.cachebusters]
    source = "assets/.*"
    target = "(css|js|json)"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true

[params]
  author = "Gyuha"
  description = "Life Log - 일상과 기술을 기록하는 블로그"
  github = "gyuha"
  rss = true
  lastmod = true
  userStatusEmoji = "🚀"

[frontmatter]
  lastmod = ["lastmod", ":fileModTime", ":default"]

[outputs]
  home = ["HTML", "RSS", "JSON"]
